version: '3.8'

services:
  backend:
    build: ./backend # Build locally from Dockerfile
    image: trinity-backend:latest # Local image name
    ports:
      - "8000:8000"
    env_file:
      - .env # Load credentials from .env
    environment:
      - DEBUG=False
      - PYTHONUNBUFFERED=1
    volumes:
      - ./db.sqlite3:/app/db.sqlite3 # Persist your database
      - ./staticfiles:/app/staticfiles # Collect static files here
    restart: always
